<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gym Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #f4f5f7;
            color: #2f3542;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #212529;
        }

        .header p {
            color: #57606f;
            font-size: 1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border: 1px solid #dfe4ea;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sidebar h2,
        .stats h3,
        .section-title {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #2f3542;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #57606f;
            font-size: 0.95rem;
        }

        select,
        button,
        input[type="checkbox"] {
            font-family: inherit;
        }

        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ced6e0;
            border-radius: 12px;
            background: white;
            color: #2f3542;
        }

        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .button.primary {
            background: #2f3542;
            color: white;
        }

        .button.primary:hover {
            background: #1e272e;
        }

        .button.secondary {
            background: #f1f2f6;
            color: #2f3542;
        }

        .button.secondary:hover {
            background: #dfe4ea;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        .voice-toggle {
            font-size: 0.95rem;
            color: #2f3542;
        }

        .stats {
            display: grid;
            gap: 16px;
        }

        .stat-card {
            padding: 18px;
            border: 1px solid #dfe4ea;
            border-radius: 14px;
            background: #f8f9fa;
        }

        .stat-card h4 {
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #57606f;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2f3542;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #dfe4ea;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            height: 100%;
            background: #2f3542;
            width: 0%;
            transition: width 0.3s ease;
        }

        .camera-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .camera-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #dfe4ea;
            background: black;
        }

        #camera,
        #overlay {
            width: 100%;
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
        }

        .status-message {
            margin: 0 auto 20px;
            max-width: 600px;
            padding: 14px 18px;
            border-radius: 12px;
            color: #2f3542;
            background: #f1f2f6;
            border: 1px solid #dfe4ea;
            display: none;
            text-align: center;
            font-size: 0.95rem;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #e6f4ea;
            border-color: #a3d0b6;
            color: #1f5d44;
        }

        .status-message.error {
            background: #ffe6e6;
            border-color: #f1a9a9;
            color: #8d2d2d;
        }

        .workout-summary {
            display: none;
            background: #f8f9fa;
            border: 1px solid #dfe4ea;
            border-radius: 16px;
            padding: 24px;
        }

        .workout-summary h2 {
            margin-bottom: 16px;
            font-size: 1.5rem;
            color: #2f3542;
        }

        .summary-list {
            display: grid;
            gap: 12px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            color: #57606f;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Smart Gym</h1>
            <p>A simple web fitness tracker with camera support.</p>
        </div>

        <div id="statusMessage" class="status-message" aria-live="polite"></div>

        <div class="main-content">
            <aside class="sidebar panel">
                <div>
                    <h2 class="section-title">Controls</h2>
                    <label for="exerciseSelect">Exercise</label>
                    <select id="exerciseSelect" aria-label="Select exercise type">
                        <option value="bicep-curl">Bicep Curl</option>
                        <option value="squat">Squat</option>
                        <option value="push-up">Push-up</option>
                        <option value="shoulder-press">Shoulder Press</option>
                        <option value="lunge">Lunge</option>
                        <option value="plank">Plank</option>
                    </select>
                </div>

                <div class="buttons">
                    <button id="startBtn" class="button primary" aria-label="Start workout">Start</button>
                    <button id="stopBtn" class="button secondary" aria-label="Stop workout" disabled>Stop</button>
                </div>

                <div class="field voice-toggle">
                    <input type="checkbox" id="voiceToggle" aria-label="Enable voice commands">
                    <label for="voiceToggle">Enable voice commands</label>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <h4>Reps</h4>
                        <div class="value" id="repCount">0</div>
                    </div>

                    <div class="stat-card">
                        <h4>Stage</h4>
                        <div class="value" id="stageDisplay">Idle</div>
                    </div>

                    <div class="stat-card">
                        <h4>Time</h4>
                        <div class="value" id="timeDisplay">00:00</div>
                    </div>

                    <div class="stat-card">
                        <h4>Progress</h4>
                        <div class="progress-bar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="10">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="camera-section panel">
                <div class="camera-container">
                    <video id="camera" autoplay playsinline muted aria-label="Camera feed"></video>
                    <canvas id="overlay" aria-label="Pose overlay"></canvas>
                </div>

                <div class="workout-summary" id="workoutSummary">
                    <h2>Workout complete</h2>
                    <div class="summary-list">
                        <div class="summary-item"><span>Total reps</span><strong id="finalReps">0</strong></div>
                        <div class="summary-item"><span>Total time</span><strong id="finalTime">00:00</strong></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <script>
        const videoElement = document.getElementById('camera');
        const canvasElement = document.getElementById('overlay');
        const canvasCtx = canvasElement.getContext('2d');

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const exerciseSelect = document.getElementById('exerciseSelect');
        const repCount = document.getElementById('repCount');
        const stageDisplay = document.getElementById('stageDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const progressFill = document.getElementById('progressFill');
        const workoutSummary = document.getElementById('workoutSummary');
        const finalReps = document.getElementById('finalReps');
        const finalTime = document.getElementById('finalTime');
        const statusMessage = document.getElementById('statusMessage');

        // Status message function
        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message show ${type}`;
            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, 3000);
        }

        let isRunning = false;
        let counter = 0;
        let stage = null;
        let startTime = null;
        let pose = null;
        let camera = null;
        let speechSynthesis = null;
        let speechRecognition = null;
        let voiceEnabled = false;

        // Initialize speech synthesis
        if ('speechSynthesis' in window) {
            speechSynthesis = window.speechSynthesis;
        }

        // Initialize speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            speechRecognition = new SpeechRecognition();
            speechRecognition.continuous = true;
            speechRecognition.interimResults = false;
            speechRecognition.lang = 'en-US';

            speechRecognition.onresult = (event) => {
                if (!voiceEnabled) return;

                const command = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                console.log('Voice command:', command);
                processVoiceCommand(command);
            };

            speechRecognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
            };

            speechRecognition.onend = () => {
                if (voiceEnabled && isRunning) {
                    speechRecognition.start();
                }
            };
        }

        // Voice feedback function
        function speak(text) {
            if (!voiceEnabled || !speechSynthesis) return;

            // Cancel any ongoing speech
            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 0.8;

            speechSynthesis.speak(utterance);
        }

        // Process voice commands
        function processVoiceCommand(command) {
            if (command.includes('start') && command.includes('workout')) {
                if (!isRunning) {
                    startBtn.click();
                    speak('Starting workout');
                }
            } else if (command.includes('stop') && command.includes('workout')) {
                if (isRunning) {
                    stopBtn.click();
                    speak('Stopping workout');
                }
            } else if (command.includes('change to') || command.includes('switch to')) {
                const exercises = ['bicep curl', 'squat', 'push-up', 'pushup', 'shoulder press', 'lunge', 'plank'];
                for (let exercise of exercises) {
                    if (command.includes(exercise)) {
                        const value = exercise.replace(' ', '-').replace('pushup', 'push-up');
                        exerciseSelect.value = value;
                        speak(`Changed to ${exercise}`);
                        break;
                    }
                }
            } else if (command.includes('how many') || command.includes('rep count')) {
                speak(`You have completed ${counter} reps`);
            } else if (command.includes('what stage') || command.includes('current stage')) {
                speak(`Current stage is ${stage || 'idle'}`);
            } else if (command.includes('time') || command.includes('how long')) {
                if (startTime) {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    speak(`Workout time is ${minutes} minutes and ${seconds} seconds`);
                }
            }
        }

        // Exercise configurations
        const exercises = {
            'bicep-curl': {
                landmarks: ['LEFT_SHOULDER', 'LEFT_ELBOW', 'LEFT_WRIST'],
                upThreshold: 160,
                downThreshold: 40,
                stageUp: 'DOWN',
                stageDown: 'UP'
            },
            'squat': {
                landmarks: ['LEFT_HIP', 'LEFT_KNEE', 'LEFT_ANKLE'],
                upThreshold: 160,
                downThreshold: 90,
                stageUp: 'UP',
                stageDown: 'DOWN'
            },
            'push-up': {
                landmarks: ['LEFT_SHOULDER', 'LEFT_ELBOW', 'LEFT_WRIST'],
                upThreshold: 160,
                downThreshold: 90,
                stageUp: 'UP',
                stageDown: 'DOWN'
            },
            'shoulder-press': {
                landmarks: ['LEFT_SHOULDER', 'LEFT_ELBOW', 'LEFT_WRIST'],
                upThreshold: 160,
                downThreshold: 40,
                stageUp: 'DOWN',
                stageDown: 'UP'
            },
            'lunge': {
                landmarks: ['LEFT_HIP', 'LEFT_KNEE', 'LEFT_ANKLE'],
                upThreshold: 160,
                downThreshold: 90,
                stageUp: 'UP',
                stageDown: 'DOWN'
            },
            'plank': {
                landmarks: ['LEFT_SHOULDER', 'LEFT_HIP', 'LEFT_ANKLE'],
                upThreshold: 180,
                downThreshold: 150,
                stageUp: 'HOLD',
                stageDown: 'REST'
            }
        };

        function calculateAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180) angle = 360 - angle;
            return angle;
        }

        function onResults(results) {
            if (!isRunning) return;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const config = exercises[exerciseSelect.value];
                const landmarks = results.poseLandmarks;

                const lm1 = landmarks[POSE_LANDMARKS[config.landmarks[0]]];
                const lm2 = landmarks[POSE_LANDMARKS[config.landmarks[1]]];
                const lm3 = landmarks[POSE_LANDMARKS[config.landmarks[2]]];

                if (lm1 && lm2 && lm3) {
                    const angle = calculateAngle(lm1, lm2, lm3);
                    const prevStage = stage;

                    if (angle > config.upThreshold) {
                        stage = config.stageUp;
                    }

                    if (angle < config.downThreshold && stage === config.stageUp) {
                        stage = config.stageDown;
                        counter++;

                        // Voice feedback for rep completion
                        if (voiceEnabled) {
                            speak(`Rep ${counter}`);
                        }
                    }

                    // Voice feedback for stage changes
                    if (voiceEnabled && prevStage !== stage && stage) {
                        if (stage === 'UP' || stage === 'DOWN') {
                            speak(stage.toLowerCase());
                        }
                    }
                }

                // Draw pose landmarks
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {
                    color: '#00FF00',
                    lineWidth: 4
                });
                drawLandmarks(canvasCtx, results.poseLandmarks, {
                    color: '#FF0000',
                    lineWidth: 2
                });
            }

            canvasCtx.restore();

            // Update UI
            repCount.textContent = counter;
            stageDisplay.textContent = stage || 'Idle';

            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }

            const progress = Math.min(counter / 10, 1) * 100;
            progressFill.style.width = `${progress}%`;
        }

        async function initCamera() {
            try {
                camera = new Camera(videoElement, {
                    onFrame: async () => {
                        if (pose && isRunning) {
                            await pose.send({image: videoElement});
                        }
                    },
                    width: 640,
                    height: 480
                });
                await camera.start();
                console.log('Camera started successfully');
            } catch (error) {
                console.error('Error starting camera:', error);
                alert('Error accessing camera. Please make sure you have granted camera permissions and try again.');
                isRunning = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function initPose() {
            pose = new Pose({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
                }
            });

            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                enableSegmentation: false,
                smoothSegmentation: false,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            pose.onResults(onResults);
        }

        startBtn.addEventListener('click', async () => {
            if (!isRunning) {
                startBtn.textContent = 'Starting...';
                startBtn.disabled = true;

                try {
                    if (!pose) {
                        initPose();
                    }

                    await initCamera();

                    isRunning = true;
                    counter = 0;
                    stage = null;
                    startTime = Date.now();
                    workoutSummary.style.display = 'none';
                    startBtn.textContent = 'Start';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;

                    showStatus('Workout started. Begin exercising.');

                    if (voiceEnabled && speechRecognition) {
                        try {
                            speechRecognition.start();
                            speak('Workout started. Use voice commands or continue manually.');
                        } catch (error) {
                            console.error('Error starting speech recognition:', error);
                        }
                    }
                } catch (error) {
                    console.error('Error initializing workout:', error);
                    startBtn.textContent = 'Start';
                    startBtn.disabled = false;
                    showStatus('Failed to start workout. Check camera permissions.');
                    alert('Failed to start workout. Please check camera permissions.');
                }
            }
        });

        stopBtn.addEventListener('click', () => {
            if (isRunning) {
                isRunning = false;
                if (camera) {
                    camera.stop();
                }
                if (speechRecognition) {
                    speechRecognition.stop();
                }
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                finalReps.textContent = counter;
                finalTime.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                workoutSummary.style.display = 'block';
                startBtn.disabled = false;
                stopBtn.disabled = true;

                showStatus('🎉 Workout completed! Great job!', 'success');

                if (voiceEnabled) {
                    speak(`Workout completed. You did ${counter} reps in ${minutes} minutes and ${seconds} seconds.`);
                }
            }
        });

        // Voice toggle functionality
        const voiceToggle = document.getElementById('voiceToggle');
        voiceToggle.addEventListener('change', () => {
            voiceEnabled = voiceToggle.checked;
            if (voiceEnabled) {
                speak('Voice commands enabled');
            } else {
                if (speechRecognition) {
                    speechRecognition.stop();
                }
                speak('Voice commands disabled');
            }
        });

        // Check browser compatibility
        const voiceSupported = 'speechSynthesis' in window && ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window);
        if (!voiceSupported) {
            document.querySelector('.voice-toggle').style.display = 'none';
            console.warn('Voice commands not supported in this browser');
        }
    </script>
</body>
</html>
